<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <!-- Fondo circular degradado -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </radialGradient>
    <!-- Skin gradient -->
    <radialGradient id="skinGrad" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f5cba7"/>
      <stop offset="100%" stop-color="#d4956a"/>
    </radialGradient>
    <!-- Skin shadow -->
    <radialGradient id="skinShadow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#c0784a" stop-opacity="0.3"/>
    </radialGradient>
    <!-- Suit gradient -->
    <linearGradient id="suitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c3e6b"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <clipPath id="circleClip">
      <circle cx="160" cy="160" r="155"/>
    </clipPath>
  </defs>

  <!-- ── Fondo circular ── -->
  <circle cx="160" cy="160" r="158" fill="url(#bgGrad)" stroke="#667eea" stroke-width="3"/>

  <!-- Decoración fondo: líneas académicas -->
  <g opacity="0.08" stroke="#fff" stroke-width="1">
    <line x1="20" y1="280" x2="300" y2="280"/>
    <line x1="20" y1="270" x2="300" y2="270"/>
    <circle cx="160" cy="160" r="100" fill="none"/>
    <circle cx="160" cy="160" r="140" fill="none"/>
  </g>

  <!-- ── Traje / cuerpo ── -->
  <g clip-path="url(#circleClip)">
    <!-- Cuerpo del traje -->
    <ellipse cx="160" cy="295" rx="95" ry="65" fill="url(#suitGrad)"/>

    <!-- Solapa izquierda -->
    <path d="M160 250 L115 245 L105 295 L155 295 Z" fill="#243255"/>
    <!-- Solapa derecha -->
    <path d="M160 250 L205 245 L215 295 L165 295 Z" fill="#243255"/>

    <!-- Camisa blanca -->
    <path d="M148 250 L160 258 L172 250 L168 295 L152 295 Z" fill="#f0f4ff"/>

    <!-- Corbata de lazo (pajarita) -->
    <g transform="translate(160, 246)">
      <!-- Lazo izquierdo -->
      <path d="M0 0 L-14 -7 L-16 0 L-14 7 Z" fill="#e74c3c"/>
      <path d="M0 0 L-14 -7 L-16 0 L-14 7 Z" fill="#c0392b" opacity="0.4"/>
      <!-- Lazo derecho -->
      <path d="M0 0 L14 -7 L16 0 L14 7 Z" fill="#e74c3c"/>
      <path d="M0 0 L14 -7 L16 0 L14 7 Z" fill="#c0392b" opacity="0.4"/>
      <!-- Nudo central -->
      <ellipse cx="0" cy="0" rx="5" ry="4" fill="#c0392b"/>
    </g>

    <!-- Cuello camisa -->
    <path d="M148 248 L155 236 L160 242 L165 236 L172 248 Z" fill="#f0f4ff"/>

    <!-- ── Cuello/garganta ── -->
    <ellipse cx="160" cy="232" rx="20" ry="15" fill="url(#skinGrad)"/>

    <!-- ── Cabeza ── -->
    <ellipse cx="160" cy="168" rx="72" ry="78" fill="url(#skinGrad)" filter="url(#shadow)"/>
    <ellipse cx="160" cy="168" rx="72" ry="78" fill="url(#skinShadow)"/>

    <!-- Orejas -->
    <ellipse cx="89" cy="168" rx="10" ry="14" fill="#e8a87c"/>
    <ellipse cx="89" cy="168" rx="6" ry="9" fill="#d4956a"/>
    <ellipse cx="231" cy="168" rx="10" ry="14" fill="#e8a87c"/>
    <ellipse cx="231" cy="168" rx="6" ry="9" fill="#d4956a"/>

    <!-- ── Cabello blanco en laterales (calvo arriba) ── -->
    <!-- Corona calva con leve brillo -->
    <ellipse cx="160" cy="112" rx="58" ry="28" fill="#eac98e" opacity="0.5"/>

    <!-- Cabello lateral izquierdo -->
    <path d="M90 130 Q78 115 84 100 Q88 88 100 90 Q108 92 110 105 Q105 120 95 138 Z"
          fill="#d5d5d5"/>
    <path d="M90 130 Q80 118 87 104 Q91 95 101 96 Q107 98 108 108 Q103 123 93 135 Z"
          fill="#ebebeb"/>

    <!-- Cabello lateral derecho -->
    <path d="M230 130 Q242 115 236 100 Q232 88 220 90 Q212 92 210 105 Q215 120 225 138 Z"
          fill="#d5d5d5"/>
    <path d="M230 130 Q240 118 233 104 Q229 95 219 96 Q213 98 212 108 Q217 123 227 135 Z"
          fill="#ebebeb"/>

    <!-- Cabello en la parte posterior/baja -->
    <path d="M95 190 Q89 210 93 228 Q96 238 105 240 Q110 230 108 210 Q105 196 98 188 Z"
          fill="#d5d5d5"/>
    <path d="M225 190 Q231 210 227 228 Q224 238 215 240 Q210 230 212 210 Q215 196 222 188 Z"
          fill="#d5d5d5"/>

    <!-- ── Cejas ── -->
    <path d="M122 148 Q138 142 150 145" stroke="#7a6040" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M170 145 Q182 142 198 148" stroke="#7a6040" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- ── Gafas de Piaget (redondas, icónicas) ── -->
    <!-- Montura izquierda -->
    <circle cx="136" cy="164" r="22" fill="none" stroke="#2c1810" stroke-width="3.5"/>
    <circle cx="136" cy="164" r="22" fill="#a8d5f0" opacity="0.18"/>
    <!-- Brillo gafa izquierda -->
    <circle cx="128" cy="157" r="5" fill="white" opacity="0.3"/>

    <!-- Montura derecha -->
    <circle cx="184" cy="164" r="22" fill="none" stroke="#2c1810" stroke-width="3.5"/>
    <circle cx="184" cy="164" r="22" fill="#a8d5f0" opacity="0.18"/>
    <!-- Brillo gafa derecha -->
    <circle cx="176" cy="157" r="5" fill="white" opacity="0.3"/>

    <!-- Puente de las gafas -->
    <path d="M158 164 Q160 161 162 164" stroke="#2c1810" stroke-width="3" fill="none"/>

    <!-- Patillas -->
    <line x1="90" y1="163" x2="114" y2="163" stroke="#2c1810" stroke-width="3" stroke-linecap="round"/>
    <line x1="206" y1="163" x2="230" y2="163" stroke="#2c1810" stroke-width="3" stroke-linecap="round"/>

    <!-- ── Ojos ── -->
    <circle cx="136" cy="164" r="7" fill="#3d2b1f"/>
    <circle cx="184" cy="164" r="7" fill="#3d2b1f"/>
    <circle cx="134" cy="162" r="2.5" fill="white"/>
    <circle cx="182" cy="162" r="2.5" fill="white"/>
    <!-- Iris -->
    <circle cx="136" cy="164" r="4" fill="#5d4037" opacity="0.7"/>
    <circle cx="184" cy="164" r="4" fill="#5d4037" opacity="0.7"/>

    <!-- ── Nariz ── -->
    <path d="M157 170 Q155 185 148 192 Q158 196 172 192 Q165 185 163 170 Z"
          fill="#c98b5a" opacity="0.5"/>
    <path d="M148 192 Q160 196 172 192" stroke="#c07840" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- ── Boca / sonrisa ── -->
    <path d="M142 208 Q160 220 178 208" stroke="#9a5a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Labios -->
    <path d="M148 208 Q160 214 172 208 Q160 218 148 208 Z" fill="#d07858" opacity="0.5"/>

    <!-- ── Mejillas rosadas ── -->
    <ellipse cx="115" cy="195" rx="14" ry="8" fill="#f08060" opacity="0.2"/>
    <ellipse cx="205" cy="195" rx="14" ry="8" fill="#f08060" opacity="0.2"/>

    <!-- ── Bigote / línea sobre labio (característica de Piaget) ── -->
    <path d="M148 204 Q155 201 160 203 Q165 201 172 204"
          stroke="#8a6040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ── Elementos decorativos externos ── -->
  <!-- Partículas / estrellas académicas -->
  <g fill="#667eea" opacity="0.6">
    <circle cx="22" cy="80" r="3"/>
    <circle cx="295" cy="90" r="2.5"/>
    <circle cx="15" cy="200" r="2"/>
    <circle cx="300" cy="220" r="3"/>
    <circle cx="40" cy="265" r="2"/>
    <circle cx="278" cy="50" r="2"/>
  </g>

  <!-- Símbolo de átomo / conocimiento arriba -->
  <g transform="translate(160, 18)" opacity="0.7">
    <circle cx="0" cy="0" r="5" fill="#667eea"/>
    <ellipse cx="0" cy="0" rx="18" ry="7" fill="none" stroke="#a29bfe" stroke-width="1.5" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="18" ry="7" fill="none" stroke="#a29bfe" stroke-width="1.5" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="18" ry="7" fill="none" stroke="#a29bfe" stroke-width="1.5" transform="rotate(120)"/>
  </g>

  <!-- Texto "JP" monograma sutil en fondo -->
  <text x="160" y="320" text-anchor="middle" font-family="Georgia, serif"
        font-size="11" fill="rgba(255,255,255,0.12)" font-weight="bold"
        letter-spacing="6">JEAN PIAGET</text>
</svg>
